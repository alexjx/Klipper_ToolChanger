[gcode_macro M109]
rename_existing: M109.1
description: [T<index>] S<temperature> W<Tolerance>]
  Waits for all temperatures, or a specified tool or heater's temperature.
  This command can be used without any additional parameters.
  Without parameters it waits for bed and current extruder.

  Tnnn Tool number.
  Snnn Temperature
  Wnnn Tolerance in degC. Defaults to 1*C. Wait will wait until heater is between set temperature +/- tolerance.

gcode:
  {% set tool = " TOOL=" ~ params.T if params.T is defined else "" %}
  {% set tolerance = params.W|default(2) %}
  {% if params.S is defined %}
    # Freeze the target and use the application service's heat-only wait.
    # S=0 turns the requested tool OFF and intentionally does not wait.
    KTCC_TOOL_M109{tool} TEMP={params.S} TOLERANCE={tolerance}
  {% else %}
    # Preserve the legacy no-S behavior: bed first, then selected tool.
    TEMPERATURE_WAIT_WITH_TOLERANCE{tool} TOLERANCE={tolerance}
  {% endif %}
