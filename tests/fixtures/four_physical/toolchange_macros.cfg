# Recording actions replace all real dock, coupler, and extrusion movement.

[gcode_macro KTCC_RECORD]
description: Record a semantic fixture event without touching hardware
gcode:
    RESPOND TYPE=echo MSG="KTCC_EVENT {rawparams}"

[gcode_macro KTCC_SYNTHETIC_THERMAL_PROFILES]
description: Expose four distinct synthetic thermal profiles without heating
variable_active_0: 201
variable_standby_0: 151
variable_active_1: 202
variable_standby_1: 152
variable_active_2: 203
variable_standby_2: 153
variable_active_3: 204
variable_standby_3: 154
gcode:
    KTCC_RECORD EVENT=thermal_profiles

[gcode_macro KTCC_EXPECTED_SELECT_TRACE]
description: Executable documentation of the selection effect contract
gcode:
    KTCC_RECORD EVENT=preheat TOOL={params.TOOL}
    KTCC_RECORD EVENT=dropoff TOOL={printer.toollock.tool_current}
    KTCC_RECORD EVENT=activate TOOL={params.TOOL}
    KTCC_RECORD EVENT=apply_retraction TOOL={params.TOOL}
    KTCC_RECORD EVENT=apply_pa TOOL={params.TOOL}
    KTCC_RECORD EVENT=pickup TOOL={params.TOOL}
    KTCC_RECORD EVENT=wait TOOL={params.TOOL}
    KTCC_RECORD EVENT=offset TOOL={params.TOOL}
    KTCC_RECORD EVENT=commit TOOL={params.TOOL}

[gcode_macro T0]
gcode:
    KTCC_T0 {rawparams}

[gcode_macro T1]
gcode:
    KTCC_T1 {rawparams}

[gcode_macro T2]
gcode:
    KTCC_T2 {rawparams}

[gcode_macro T3]
gcode:
    KTCC_T3 {rawparams}

[gcode_macro DROP_TOOL]
gcode:
    KTCC_TOOL_DROPOFF_ALL
