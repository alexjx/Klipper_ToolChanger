# Synthetic contract fixture. All values are deliberately non-production.

[toollock]
init_printer_to_last_tool: False
purge_on_toolchange: True
tool_lock_gcode:
    KTCC_RECORD EVENT=lock
tool_unlock_gcode:
    KTCC_RECORD EVENT=unlock

[toolgroup 0]
is_virtual: False
meltzonelength: 10
idle_to_standby_time: 30
idle_to_powerdown_time: 300
pickup_gcode:
    KTCC_RECORD EVENT=pickup TOOL={myself.name}
    KTCC_RECORD EVENT=wait TOOL={myself.name}
    KTCC_RECORD EVENT=offset TOOL={myself.name}
dropoff_gcode:
    KTCC_RECORD EVENT=dropoff TOOL={myself.name}

[tool 0]
tool_group: 0
extruder: extruder
fan: part_fan_0
zone: 0,0,0
park: 0,0,0
offset: 0.01,0.02,0.03
meltzonelength: 11
idle_to_standby_time: 31
idle_to_powerdown_time: 301
shaper_freq_x: 41
shaper_freq_y: 42
shaper_type_x: mzv
shaper_type_y: ei

