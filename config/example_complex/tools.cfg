# Four-physical-tool framework example.
#
# Tool groups provide shared physical configuration and actions. Each [tool N]
# remains an independent physical tool and may override any shared default.
# Coordinates are X,Y,Z. Adapt every coordinate and motion to your machine.

[save_variables]
filename: ~/variables.cfg

[toollock]
purge_on_toolchange: True
tool_lock_gcode:
  SAVE_GCODE_STATE NAME=tool_lock_state
  MANUAL_STEPPER STEPPER=tool_lock SET_POSITION=0
  MANUAL_STEPPER STEPPER=tool_lock MOVE=1 SPEED=30 STOP_ON_ENDSTOP=-1 SYNC=1
  SET_TMC_CURRENT STEPPER=tool_lock CURRENT=1.0
  MANUAL_STEPPER STEPPER=tool_lock MOVE=150 SPEED=50 STOP_ON_ENDSTOP=1 SYNC=1
  M400
  SET_TMC_CURRENT STEPPER=tool_lock CURRENT=0.7
  RESTORE_GCODE_STATE NAME=tool_lock_state MOVE=0
tool_unlock_gcode:
  SAVE_GCODE_STATE NAME=tool_unlock_state
  MANUAL_STEPPER STEPPER=tool_lock SET_POSITION=180
  MANUAL_STEPPER STEPPER=tool_lock MOVE=179 SPEED=30 STOP_ON_ENDSTOP=-1 SYNC=1
  MANUAL_STEPPER STEPPER=tool_lock MOVE=0 SPEED=100 STOP_ON_ENDSTOP=1 SYNC=1
  M400
  MANUAL_STEPPER STEPPER=tool_lock ENABLE=0
  RESTORE_GCODE_STATE NAME=tool_unlock_state MOVE=0

[toolgroup 0]
# Shared policy. A tool section can override any of these values.
idle_to_standby_time: 30
idle_to_powerdown_time: 1800
lazy_home_when_parking: 1
meltzonelength: 18
select_wait_mode: HEAT
select_wait_tolerance: 1
select_wait_timeout: 900
pickup_gcode:
  SUB_TOOL_PICKUP T={myself.name}
dropoff_gcode:
  SUB_TOOL_DROPOFF T={myself.name}

[tool 0]
tool_group: 0
extruder: extruder
fan: partfan_t0
zone: 550,5,0
park: 598,5,0
offset: 0,0,0
retract_length: 0.8
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35
pressure_advance: 0.025
pressure_advance_smooth_time: 0.04
heater_active_temp: 220
heater_standby_temp: 170

[tool 1]
tool_group: 0
extruder: extruder1
fan: partfan_t1
zone: 550,100,0
park: 598,100,0
offset: -0.12,0.08,-0.03
retract_length: 0.9
retract_speed: 32
unretract_extra_length: 0
unretract_speed: 32
pressure_advance: 0.030
pressure_advance_smooth_time: 0.04
heater_active_temp: 225
heater_standby_temp: 175

[tool 2]
tool_group: 0
extruder: extruder2
fan: partfan_t2
zone: 550,195,0
park: 598,195,0
offset: 0.18,-0.05,0.02
retract_length: 1.0
retract_speed: 30
unretract_extra_length: 0.05
unretract_speed: 30
pressure_advance: 0.035
pressure_advance_smooth_time: 0.045
heater_active_temp: 230
heater_standby_temp: 180

[tool 3]
tool_group: 0
extruder: extruder3
fan: partfan_t3
zone: 550,290,0
park: 598,290,0
offset: -0.07,-0.11,0.05
retract_length: 1.1
retract_speed: 28
unretract_extra_length: 0.05
unretract_speed: 28
pressure_advance: 0.040
pressure_advance_smooth_time: 0.045
heater_active_temp: 235
heater_standby_temp: 185

[gcode_macro SUB_TOOL_PICKUP]
description: Example physical pickup action; validate all motions for your printer
gcode:
  {% set tool = printer['tool ' ~ params.T] %}
  SAVE_GCODE_STATE NAME=tool_pickup_state
  G90
  G0 X500 F40000
  G0 Y{tool.zone[1]} F40000
  G0 X{tool.park[0]|float - 15} F40000
  G0 X{tool.park[0]} F3000
  M400
  TOOL_LOCK
  SET_GCODE_OFFSET Z={tool.offset[2]} MOVE=1
  G0 X{tool.zone[0]} F6000
  G0 X500 F40000
  RESTORE_GCODE_STATE NAME=tool_pickup_state MOVE=0
  SET_GCODE_OFFSET X={tool.offset[0]} Y={tool.offset[1]} Z={tool.offset[2]} MOVE=0

[gcode_macro SUB_TOOL_DROPOFF]
description: Example physical dropoff action; validate all motions for your printer
gcode:
  {% set tool = printer['tool ' ~ params.T] %}
  SAVE_GCODE_STATE NAME=tool_dropoff_state
  SET_GCODE_OFFSET X=0 Y=0 MOVE=0
  G90
  G0 X500 F40000
  G0 Y{tool.zone[1]} F40000
  G0 X{tool.zone[0]} F40000
  G0 X{tool.park[0]} F3000
  M400
  TOOL_UNLOCK
  G0 X{tool.park[0]|float - 15} F6000
  G0 X500 F40000
  RESTORE_GCODE_STATE NAME=tool_dropoff_state MOVE=0
